<div class="dashboard-container">
  <!-- Toolbar: Search + Add Button -->
  <div class="toolbar">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search Employees</mat-label>
      <input matInput type="text" [(ngModel)]="searchTerm" placeholder="Search employees by name">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="toggleAddForm()">
      <mat-icon>{{ showAddForm ? 'close' : 'add' }}</mat-icon>
      {{ showAddForm ? 'Cancel' : 'Add Employee' }}
    </button>
  </div>

  <!-- Add/Edit Form -->
  <div *ngIf="showAddForm || editingEmployee" class="form-wrapper">
    <app-employee-form [employee]="editingEmployee" (formSubmit)="onFormSubmit($event)" (formCancel)="onFormCancel()">
    </app-employee-form>
  </div>

  <!-- Employee List — async pipe unwraps the Observable stream -->
  <div *ngIf="employees$ | async as employees; else loading">
    <div class="employee-container" *ngIf="(employees | employeeSearch:searchTerm) as filtered">

      <div *ngIf="filtered.length === 0" class="no-data">
        No employees found{{ searchTerm ? ' matching "' + searchTerm + '"' : '' }}.
      </div>

      <div class="employee-card"
           *ngFor="let emp of filtered"
           appHighlightSalary
           [salary]="emp.salary">

        <div class="card-header">
          <div class="card-title">
            <h3>{{ emp.name }}</h3>
            <span class="employee-id">#{{ emp.id }}</span>
          </div>
          <div class="card-actions">
            <button mat-icon-button color="accent" (click)="viewEmployee(emp)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="startEdit(emp)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteEmployee(emp.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </div>

        <div class="card-body">
          <p><strong>Role:</strong> {{ emp.role }}</p>
          <p><strong>Department:</strong> {{ emp.department }}</p>
          <p><strong>Salary:</strong> {{ emp.salary | currency:'USD':'symbol':'1.0-0' }}</p>
          <p *ngIf="emp.email"><strong>Email:</strong> {{ emp.email }}</p>
        </div>
      </div>

    </div>
  </div>

  <ng-template #loading>
    <div class="loading-message">
      <p>Loading employee data...</p>
    </div>
  </ng-template>
</div>
