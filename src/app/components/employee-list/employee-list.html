<div class="dashboard-container">
  <app-employee-detail *ngIf="viewingEmployee" [employee]="viewingEmployee" (close)="closeView()">
  </app-employee-detail>

  <div class="header-actions">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filter by Department</mat-label>
      <input matInput type="text" [(ngModel)]="filterDepartment" placeholder="e.g., IT, HR, Engineering">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="toggleAddForm()">
      <mat-icon>{{ showAddForm ? 'close' : 'add' }}</mat-icon>
      {{ showAddForm ? 'Cancel Add' : 'Add Employee' }}
    </button>
  </div>

  <!-- Form Component (Add or Edit) -->
  <div *ngIf="showAddForm || editingEmployee" class="form-wrapper">
    <app-employee-form [employee]="editingEmployee" (formSubmit)="onFormSubmit($event)" (formCancel)="onFormCancel()">
    </app-employee-form>
  </div>

  <!-- Material Table wrapped in Async Data -->
  <div *ngIf="employees$ | async as employees; else loading" class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="employees | departmentFilter:filterDepartment">

      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let element"> {{element.role}} </td>
      </ng-container>

      <!-- Department Column -->
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef> Department </th>
        <td mat-cell *matCellDef="let element"> {{element.department}} </td>
      </ng-container>

      <!-- Salary Column -->
      <ng-container matColumnDef="salary">
        <th mat-header-cell *matHeaderCellDef> Salary </th>
        <td mat-cell *matCellDef="let element"> {{element.salary | currency:'USD':'symbol':'1.0-0'}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" (click)="viewEmployee(element)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="primary" (click)="startEdit(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteEmployee(element.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- Applying Custom Directive 'appHighlightSalary' to highlight the row natively -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" appHighlightSalary [salary]="row.salary"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6" style="text-align: center; padding: 20px;">
          No data matching the filter "{{filterDepartment}}"
        </td>
      </tr>
    </table>
  </div>

  <ng-template #loading>
    <div style="text-align: center; padding: 20px;">
      Loading employee data...
    </div>
  </ng-template>
</div>
